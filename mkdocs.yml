site_name: "Ethéria, Cité des Concepts"
site_description: "Wiki de jeu de rôle personnel"
# IMPORTANT : remplace <utilisateur> et <repo> ci-dessous avant de publier,
# sinon les liens internes et assets seront mal résolus sur GitHub Pages.
site_url: "https://spigushe.github.io/etheria-cite-concepts/"

# Thème Material pour MkDocs : https://squidfunk.github.io/mkdocs-material/
# Personnalisation en trois palettes de couleurs, avec un toggle pour passer de l'une à l'autre.
theme:
  name: material
  language: fr
  palette:
    - scheme: epure
      primary: white
      accent: amber
      toggle:
        icon: material/brightness-7
        name: "Passer au style parchemin"
    - scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-5
        name: "Passer au style nocturne"
    - scheme: mystere
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-4
        name: "Passer au style épuré"
  # Polices auto-hébergées (voir docs/stylesheets/extra.css et
  # docs/assets/fonts/) : plus d'appel à Google Fonts au build ni au
  # chargement de la page.
  font: false
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.top
    - search.suggest
    - content.code.copy
    - toc.follow

plugins:
  - search
  - to-pdf:
      enabled_if_env: ENABLE_PDF_EXPORT
      output_path: pdf/documentation.pdf

extra_css:
  - assets/stylesheets/callouts.css
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/carrousel.js

hooks:
  - scripts/version.py # injecte {{ version }} depuis CHANGELOG.md
  - scripts/cards.py # génère les cartes (PNG recto + PDF recto-verso)

markdown_extensions:
  - scripts.obsidian_callouts # syntaxe > [!TYPE] Titre (fichier local du repo)
  - admonition # garde !!! note / ??? tip disponibles en secours
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Accueil: index.md
  - Présentation:
      - Pitch: monde/pitch.md
      - Système: mj/systeme.md
  - Univers d'Éthéria:
      - Introduction: monde/introduction.md
      - Histoire: monde/histoire.md
      - Cartographie: monde/cartographie.md
      - Personnages: monde/personnages.md
      - Quartiers:
          - Vue d'ensemble: monde/quartiers/index.md
          - Le Labyrinthe des Identités: monde/quartiers/labyrinthe-des-identites.md
          - La Concorde du Pacte: monde/quartiers/concorde-du-pacte.md
          - La Balance d'Orion: monde/quartiers/balance-d-orion.md
          - Le Gouffre d'Absyr: monde/quartiers/gouffre-d-absyr.md
          - Les Rails de la Décision: monde/quartiers/rails-de-la-decision.md
          - Les Jardins de l'Équité: monde/quartiers/jardins-de-l-equite.md
          - La Citadelle de l'Arété: monde/quartiers/citadelle-de-l-arete.md
  - Ressources Philo:
      - Accueil: resources-philo/index.md
      - Concepts par quartier:
          - Vue d'ensemble: resources-philo/concepts/index.md
          - Le Labyrinthe des Identités: resources-philo/concepts/labyrinthe-des-identites.md
          - La Concorde du Pacte: resources-philo/concepts/concorde-du-pacte.md
          - La Balance d'Orion: resources-philo/concepts/balance-d-orion.md
          - Le Gouffre d'Absyr: resources-philo/concepts/gouffre-d-absyr.md
