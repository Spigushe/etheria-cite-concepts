name: Build, PDF et déploiement du wiki

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.13"
  ENABLE_PDF_EXPORT: "1"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v6

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installer les dépendances système
        run: |
          sudo apt-get update
          sudo apt-get install -y zip libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz-subset0

      - name: Installer les dépendances Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Construire le site MkDocs
        run: |
          python -m mkdocs build --strict

      - name: Préparer les artefacts
        run: |
          mkdir -p dist

          TAG="${GITHUB_REF#refs/tags/}"

          cp site/pdf/etheria-jdr.pdf \
             "dist/etheria-jdr-${TAG}.pdf"

          cp site/assets/cartes/toutes-les-cartes.pdf \
             "dist/cartes-a-imprimer-${TAG}.pdf"

          (
            cd site
            zip -r "../dist/site-${TAG}.zip" .
          )

      - name: Publier l'artefact GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Publier les assets sur la Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --generate-notes

          gh release upload "$TAG" \
            dist/etheria-jdr-${TAG}.pdf \
            dist/cartes-a-imprimer-${TAG}.pdf \
            dist/site-${TAG}.zip \
            --clobber

      - name: Publier les artefacts du build
        uses: actions/upload-artifact@v4
        with:
          name: documentation-${{ github.ref_name }}
          path: dist/
          retention-days: 30

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4